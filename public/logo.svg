<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Ledger book body -->
  <rect x="10" y="8" width="44" height="48" rx="6" fill="#FAF7F2" stroke="#D97757" stroke-width="2.5"/>
  <!-- Spine -->
  <line x1="20" y1="8" x2="20" y2="56" stroke="#D97757" stroke-width="2.5"/>
  <!-- Binding dots -->
  <circle cx="20" cy="20" r="2" fill="#D97757"/>
  <circle cx="20" cy="32" r="2" fill="#D97757"/>
  <circle cx="20" cy="44" r="2" fill="#D97757"/>
  <!-- Lines on page -->
  <line x1="27" y1="22" x2="47" y2="22" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="30" x2="47" y2="30" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="38" x2="47" y2="38" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Short value lines -->
  <line x1="27" y1="46" x2="38" y2="46" stroke="#D97757" stroke-width="1.5" stroke-linecap="round"/>
</svg>
